<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Servicios | Brixo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Servicios</h1>
        <a th:if="${esCliente or esAdmin}" th:href="@{/servicios/nuevo}" class="btn btn-dark">Nuevo servicio</a>
    </div>

    <div th:if="${ok}" class="alert alert-success" th:text="${ok}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:if="${esCliente or esAdmin}" class="card card-body mb-3" method="post" enctype="multipart/form-data"
          th:action="@{/servicios/importar-excel}">
        <div class="row g-2 align-items-end">
            <div class="col-md-7">
                <label class="form-label" for="archivo">Importar Excel (.xlsx)</label>
                <input id="archivo" name="archivo" type="file" class="form-control" accept=".xlsx" required>
            </div>
            <div class="col-md-5">
                <button type="submit" class="btn btn-outline-primary">Importar servicios</button>
            </div>
        </div>
        <small class="text-muted mt-2">Formato columnas: titulo | descripcion | ubicacion | presupuesto | estado(ABIERTO, EN_PROCESO, CERRADO).</small>
    </form>

    <form class="card card-body mb-3" method="get" th:action="@{/servicios}">
        <div class="row g-2">
            <div class="col-md-4">
                <label class="form-label" for="titulo">Titulo</label>
                <input id="titulo" name="titulo" type="text" class="form-control" th:value="${titulo}">
            </div>
            <div class="col-md-3">
                <label class="form-label" for="estado">Estado</label>
                <select id="estado" name="estado" class="form-select">
                    <option value="">Todos</option>
                    <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"
                            th:selected="${estado == e.name()}"></option>
                </select>
            </div>
            <div class="col-md-3" th:if="${esAdmin}">
                <label class="form-label" for="emailCliente">Email cliente</label>
                <input id="emailCliente" name="emailCliente" type="text" class="form-control" th:value="${emailCliente}">
            </div>
            <div class="col-md-2 d-flex align-items-end gap-2">
                <button type="submit" class="btn btn-primary">Filtrar</button>
                <a class="btn btn-outline-secondary"
                   th:href="@{/servicios/reporte.csv(titulo=${titulo},estado=${estado},emailCliente=${emailCliente})}">
                    CSV
                </a>
            </div>
        </div>
    </form>

    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Titulo</th>
                <th>Ubicacion</th>
                <th>Presupuesto</th>
                <th>Estado</th>
                <th>Cliente</th>
                <th>Fecha</th>
                <th class="text-end">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${servicios}">
                <td th:text="${s.id}"></td>
                <td th:text="${s.titulo}"></td>
                <td th:text="${s.ubicacion}"></td>
                <td th:text="${#numbers.formatDecimal(s.presupuesto, 1, 'POINT', 2, 'COMMA')}"></td>
                <td th:text="${s.estado}"></td>
                <td th:text="${s.cliente != null ? s.cliente.email : '-'}"></td>
                <td th:text="${#temporals.format(s.fechaCreacion, 'yyyy-MM-dd HH:mm')}"></td>
                <td class="text-end">
                    <a th:if="${esAdmin or (esCliente and s.cliente != null and s.cliente.email == #authentication.name)}"
                       class="btn btn-sm btn-outline-primary"
                       th:href="@{/servicios/{id}/editar(id=${s.id})}">Editar</a>
                    <form th:if="${esAdmin or (esCliente and s.cliente != null and s.cliente.email == #authentication.name)}"
                          th:action="@{/servicios/{id}/eliminar(id=${s.id})}"
                          method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                onclick="return confirm('¿Eliminar servicio?')">Eliminar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
