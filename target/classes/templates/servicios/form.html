<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario Servicio | Brixo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <h1 class="h3 mb-3" th:text="${servicio.id == null} ? 'Nuevo servicio' : 'Editar servicio'"></h1>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="${servicio.id == null} ? @{/servicios} : @{/servicios/{id}(id=${servicio.id})}"
          th:object="${servicio}" method="post" class="card card-body shadow-sm">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label" for="titulo">Titulo</label>
                <input id="titulo" type="text" th:field="*{titulo}" class="form-control">
                <div class="text-danger small" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></div>
            </div>
            <div class="col-md-6">
                <label class="form-label" for="ubicacion">Ubicacion</label>
                <input id="ubicacion" type="text" th:field="*{ubicacion}" class="form-control">
                <div class="text-danger small" th:if="${#fields.hasErrors('ubicacion')}" th:errors="*{ubicacion}"></div>
            </div>
            <div class="col-md-6">
                <label class="form-label" for="presupuesto">Presupuesto</label>
                <input id="presupuesto" type="number" min="0" step="0.01" th:field="*{presupuesto}" class="form-control">
                <div class="text-danger small" th:if="${#fields.hasErrors('presupuesto')}" th:errors="*{presupuesto}"></div>
            </div>
            <div class="col-md-6">
                <label class="form-label" for="estado">Estado</label>
                <select id="estado" th:field="*{estado}" class="form-select">
                    <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
                </select>
                <div class="text-danger small" th:if="${#fields.hasErrors('estado')}" th:errors="*{estado}"></div>
            </div>
            <div class="col-12">
                <label class="form-label" for="descripcion">Descripcion</label>
                <textarea id="descripcion" th:field="*{descripcion}" class="form-control" rows="4"></textarea>
                <div class="text-danger small" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
            </div>
        </div>

        <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-dark">Guardar</button>
            <a th:href="@{/servicios}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
