<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Brixo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-3 text-center">Ingresar a Brixo</h1>

                    <div th:if="${param.error}" class="alert alert-danger">Credenciales invalidas.</div>
                    <div th:if="${param.logout}" class="alert alert-success">Sesion cerrada correctamente.</div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label" for="username">Correo</label>
                            <input id="username" name="username" type="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="password">Contraseña</label>
                            <input id="password" name="password" type="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-dark w-100">Entrar</button>
                    </form>

                    <p class="small text-muted mt-3 mb-0">Usuario inicial: admin@brixo.com / Admin123*</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
