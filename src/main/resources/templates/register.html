<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro – Brixo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/brixo.css}">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
    <div class="card border-0 shadow rounded-4 p-4" style="width:100%;max-width:480px">
        <div class="text-center mb-4">
            <a th:href="@{/}" class="text-decoration-none text-dark">
                <i class="fas fa-hard-hat fa-2x text-warning"></i>
                <h4 class="fw-bold mt-2 mb-0">Crear cuenta</h4>
            </a>
        </div>

        <div th:if="${error}" class="alert alert-danger small" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nombre completo</label>
                <input type="text" name="nombre" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Correo electrónico</label>
                <input type="email" name="correo" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Contraseña</label>
                <input type="password" name="contrasena" class="form-control" required minlength="8">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Teléfono</label>
                <input type="tel" name="telefono" class="form-control">
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Ciudad</label>
                <input type="text" name="ciudad" class="form-control">
            </div>
            <button type="submit" class="btn btn-warning w-100 rounded-pill fw-bold">
                <i class="fas fa-user-plus me-2"></i>Crear cuenta
            </button>
        </form>
        <hr class="my-3">
        <p class="text-center small mb-0">
            ¿Ya tienes cuenta? <a th:href="@{/login}" class="text-primary fw-semibold">Inicia sesión</a>
        </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
