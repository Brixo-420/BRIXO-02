<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario Usuario | Brixo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <h1 class="h3 mb-3" th:text="${usuario.id == null} ? 'Nuevo usuario' : 'Editar usuario'"></h1>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="${usuario.id == null} ? @{/admin/usuarios} : @{/admin/usuarios/{id}(id=${usuario.id})}"
          th:object="${usuario}" method="post" class="card card-body shadow-sm">

        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label" for="nombre">Nombre</label>
                <input id="nombre" type="text" th:field="*{nombre}" class="form-control">
                <div class="text-danger small" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="email">Correo</label>
                <input id="email" type="email" th:field="*{email}" class="form-control">
                <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="password">Contraseña</label>
                <input id="password" type="password" th:field="*{password}" class="form-control"
                       th:attr="placeholder=${usuario.id == null} ? '' : 'Dejar en blanco para no cambiar'">
                <div class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="rolId">Rol</label>
                <select id="rolId" name="rolId" class="form-select" required>
                    <option value="">Seleccione un rol</option>
                    <option th:each="rol : ${roles}"
                            th:value="${rol.id}"
                            th:selected="${usuario.rol != null and usuario.rol.id == rol.id}"
                            th:text="${rol.nombre}"></option>
                </select>
            </div>
        </div>

        <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-dark">Guardar</button>
            <a th:href="@{/admin/usuarios}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
