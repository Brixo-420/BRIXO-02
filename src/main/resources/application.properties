# ── Servidor ────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Base de Datos ────────────────────────────────────────────────────────────
# Configuración de desarrollo local con H2 (evita depender del servidor MySQL).
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:brixo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# ── HikariCP (pool de conexiones) ───────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:3}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ── Flyway (migraciones) ────────────────────────────────────────────────────
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ── Endpoint de migraciones (invocación manual) ───────────────────────────
migration.endpoint.enabled=${MIGRATION_ENDPOINT_ENABLED:false}

# ── Thymeleaf ───────────────────────────────────────────────────────────────
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ── Spring Security ──────────────────────────────────────────────────────────
spring.security.user.name=unused
spring.security.user.password=unused

# ── Sesiones ────────────────────────────────────────────────────────────────
server.servlet.session.timeout=30m

# ── Subida de archivos ──────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ── LLM (cotizador IA) ─────────────────────────────────────────────────────
# Proveedor: groq | openai | anthropic
llm.provider=${LLM_PROVIDER:groq}
llm.api-key=${LLM_API_KEY:}
llm.model=${LLM_MODEL:}

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.brixo=INFO
logging.level.org.springframework.security=WARN
